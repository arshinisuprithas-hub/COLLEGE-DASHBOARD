<!DOCTYPE html>
<html>
<head>
  <title>Arshini Supritha Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🚀 Arshini Supritha</h1>
  <p>Placement Preparation Dashboard</p>
</header>

<div class="grid">

  <div class="card">
    <h2>📊 CGPA Tracker</h2>
    <input type="number" id="cgpaInput" placeholder="Enter CGPA">
    <button onclick="saveCGPA()">Save</button>
    <p id="cgpaDisplay"></p>
  </div>

  <div class="card">
    <h2>💼 Placement Progress</h2>
    <input type="range" id="progress" min="0" max="100">
    <p id="progressValue">0%</p>
  </div>

  <div class="card">
    <h2>📅 Exam Dates</h2>
    <input type="text" id="examInput" placeholder="OS - 25 April">
    <button onclick="addExam()">Add</button>
    <ul id="examList"></ul>
  </div>

  <div class="card">
    <h2>📚 Subjects</h2>
    <ul>
      <li onclick="openSubject('os')">Operating System</li>
      <li onclick="openSubject('crypto')">Cryptography</li>
      <li onclick="openSubject('ml')">Machine Learning</li>
      <li onclick="openSubject('prob')">Probability & Stats</li>
      <li onclick="openSubject('sdd')">Software Design</li>
      <li onclick="openSubject('log')">Logistics</li>
    </ul>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
