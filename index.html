<!DOCTYPE html>
<html>
<head>
    <title>Vishnu's Placement Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🚀 Vishnu Varshan - Placement Dashboard</h1>

<section>
    <h2>🎯 Goal</h2>
    <p>Get placed in top IT company with high LPA</p>
</section>

<section>
    <h2>📚 Subjects</h2>
    <ul id="subjects">
        <li>Operating System</li>
        <li>Cryptography</li>
        <li>Machine Learning</li>
        <li>Probability & Statistics</li>
        <li>Software Design</li>
        <li>Logistics Info System</li>
    </ul>
</section>

<section>
    <h2>📅 Exam Dates</h2>
    <ul id="exams"></ul>
    <input type="text" id="examInput" placeholder="Enter exam info">
    <button onclick="addExam()">Add</button>
</section>

<section>
    <h2>📝 Notes</h2>
    <textarea id="notes" placeholder="Write your notes..."></textarea>
</section>

<section>
    <h2>✅ Daily Tasks</h2>
    <input type="text" id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add Task</button>
    <ul id="tasks"></ul>
</section>

<script src="script.js"></script>

</body>
</html>
